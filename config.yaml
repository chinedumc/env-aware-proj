environments:
  development:
    db:
      connectionString: "Host=localhost;Port=5432;Database=accounts_dev;Username=devuser;Password=devpass"
    api:
      baseUrl: "http://localhost:5000/api"
    frontend:
      baseUrl: "http://localhost:3000"
    tables:
      accounts: "accts_dev"

  quality_assurance:
    db:
      connectionString: "Host=qa-db.env-aware-proj.com;Port=5432;Database=accounts_qa;Username=qauser;Password=qapass"
    api:
      baseUrl: "https://qa.api.env-aware-proj.com/api"
    frontend:
      baseUrl: "https://qa.fe.env-aware-proj.com"
    tables:
      accounts: "accts_qa"

  pilot:
    db:
      connectionString: "Host=pilot-db.env-aware-proj.com;Port=5432;Database=accounts_pilot;Username=pilotuser;Password=pilotpass"
    api:
      baseUrl: "https://pilot.api.env-aware-proj.com/api"
    frontend:
      baseUrl: "https://pilot.fe.env-aware-proj.com"
    tables:
      accounts: "accts_pilot"

  prod:
    db:
      connectionString: "Host=prod-db.env-aware-proj.com;Port=5432;Database=accounts;Username=produser;Password=prodpass"
    api:
      baseUrl: "https://api.env-aware-proj.com/api"
    frontend:
      baseUrl: "https://fe.env-aware-proj.com"
    tables:
      accounts: "accts"
